name: Deploy to Hostinger

# Build the static export and push it to Hostinger over FTP on every push to
# main. Also runnable manually from the Actions tab.
on:
  push:
    branches: [main]
    # Don't redeploy for docs-only changes (no effect on the built site).
    paths-ignore:
      - "**.md"
      - "context/**"
      - "DEPLOY.md"
  workflow_dispatch:

# Prevent overlapping deploys from racing each other.
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Add server config (.htaccess)
        run: cp deploy/.htaccess out/.htaccess

      # Hostinger sporadically drops some GitHub-runner IPs on port 21
      # (intermittent ETIMEDOUT), so we attempt the FTP deploy up to 3 times.
      # The action resumes from its server-side sync state, so retries are cheap.
      - name: Deploy to Hostinger via FTP (attempt 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          timeout: 60000
          local-dir: ./out/
          # This FTP account is jailed to the web root, so the FTP root IS
          # public_html. Deploy straight to ./ (verified against the live site).
          server-dir: ./
          # Per-commit state file (keyed by the git SHA). Incremental sync state
          # drifts on this host: after a build, Next's build id changes, and the
          # action tries to delete an already-gone _next/<hash> folder -> fatal
          # 550. We used to fix this by hand-bumping a version suffix after every
          # red deploy (a treadmill). A SHA-scoped state name means every deploy
          # finds NO prior state -> full re-upload, deletes nothing, always green.
          # The three retry attempts share this same SHA, so they resume cleanly.
          # (Trade-off: old _next/<hash> chunks orphan on the server; harmless
          # dead weight. Run a manual dangerous-clean-slate deploy to prune.)
          state-name: .ricardo-os-deploy-state-${{ github.sha }}.json
          # Never let the sync wipe SSL/domain-verification files.
          exclude: |
            **/.git*
            **/.git*/**
            **/.well-known/**

      - name: Wait before retry 2
        if: steps.ftp1.outcome == 'failure'
        run: sleep 20

      - name: Deploy to Hostinger via FTP (attempt 2)
        id: ftp2
        if: steps.ftp1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          timeout: 60000
          local-dir: ./out/
          server-dir: ./
          state-name: .ricardo-os-deploy-state-${{ github.sha }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.well-known/**

      - name: Wait before retry 3
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        run: sleep 30

      - name: Deploy to Hostinger via FTP (attempt 3)
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          timeout: 60000
          local-dir: ./out/
          server-dir: ./
          state-name: .ricardo-os-deploy-state-${{ github.sha }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.well-known/**
