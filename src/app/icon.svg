<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46D6FF"/>
      <stop offset="0.55" stop-color="#00BFFF"/>
      <stop offset="1" stop-color="#1784DB"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- glassy bubble fill, reused for every blob of the R -->
    <radialGradient id="bubble" cx="0.35" cy="0.28" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.99"/>
      <stop offset="0.4" stop-color="#eafaff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#9fdcff" stop-opacity="0.45"/>
    </radialGradient>
  </defs>

  <!-- glossy aqua app tile -->
  <rect x="3" y="3" width="58" height="58" rx="16" fill="url(#tile)"/>
  <!-- glass edge -->
  <rect x="3.9" y="3.9" width="56.2" height="56.2" rx="15.1" fill="none"
        stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.6"/>
  <!-- top gloss sweep -->
  <path d="M6 22 Q6 6 22 6 H42 Q58 6 58 22 V27 Q34 17 6 30 Z" fill="url(#gloss)"/>

  <!-- ===== "R" built from glassy Frutiger bubbles ===== -->
  <g stroke="#ffffff" stroke-opacity="0.55" stroke-width="0.9">
    <!-- vertical stem -->
    <circle cx="21" cy="17" r="5.4" fill="url(#bubble)"/>
    <circle cx="21" cy="26" r="5.4" fill="url(#bubble)"/>
    <circle cx="21" cy="35" r="5.4" fill="url(#bubble)"/>
    <circle cx="21" cy="44" r="5.4" fill="url(#bubble)"/>
    <!-- bowl (top curve of the R) -->
    <circle cx="30" cy="15" r="5.2" fill="url(#bubble)"/>
    <circle cx="37" cy="19" r="5.0" fill="url(#bubble)"/>
    <circle cx="37" cy="26" r="5.0" fill="url(#bubble)"/>
    <circle cx="30" cy="29" r="5.2" fill="url(#bubble)"/>
    <!-- diagonal leg -->
    <circle cx="33" cy="37" r="5.2" fill="url(#bubble)"/>
    <circle cx="39" cy="44" r="5.4" fill="url(#bubble)"/>
  </g>
  <!-- specular dots on a couple of bubbles -->
  <circle cx="19" cy="14.5" r="1.7" fill="#ffffff" fill-opacity="0.95"/>
  <circle cx="28" cy="12.5" r="1.5" fill="#ffffff" fill-opacity="0.9"/>
</svg>
